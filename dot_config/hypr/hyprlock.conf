source = ~/.config/hypr/colors/colors.conf

$image = ~/wallpaper/firewatch_sunset.png
$font = FiraCode Nerd Font

general {
    hide_cursor = false
}

background {
    monitor =
    path = $image
    blur_passes = 3
    disable_loading_screen = false
    contrast = 0.8916
    brightness = 0.5172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    # monitor =
    size = 18%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = $surface_variant
    check_color = $outline
    fail_color = $on_error
    # outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    # check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    # fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg

    placeholder_text = Input Password
    fail_text = $PAMFAIL

    font_family = $font
    font_color = $primary
    fade_on_empty = false
    rounding = 15

    position = 0, 0
    halign = center
    valign = center


}

# LAYOUT
label {
    monitor =
    text = $LAYOUT[en,ru]
    font_size = 18
    font_family = $font
    onclick = hyprctl switchxkblayout all next

    position = 206, 0
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = 0, -100
    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = 0, -250
    halign = center
    valign = top
}

